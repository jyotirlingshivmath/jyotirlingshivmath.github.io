<!DOCTYPE html>
<html>
<head>
  <title>Registration - Redirecting...</title>
  <meta charset="UTF-8">
  <style>
    body { 
      font-family: Arial, sans-serif; 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      height: 100vh; 
      margin: 0; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
    }
    .container { 
      background: white; 
      padding: 40px; 
      border-radius: 15px; 
      box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
      text-align: center; 
      min-width: 300px;
    }
    h1 { color: #2c3e50; margin-bottom: 20px; }
    .spinner { 
      border: 4px solid #f3f3f3; 
      border-top: 4px solid #3498db; 
      border-radius: 50%; 
      width: 50px; 
      height: 50px; 
      animation: spin 1s linear infinite; 
      margin: 20px auto; 
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .countdown { font-size: 24px; font-weight: bold; color: #3498db; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚀 Redirecting to Registration...</h1>
    <div class="spinner"></div>
    <div class="countdown" id="countdown">5</div>
    <p>Click <a href="https://script.google.com/macros/s/AKfycbxMjpVgpSb_guwHO9FwFB46S41GCelZoOWhVZ1ndDkAUVxQkXYPuZAnLSGgfSHeOg70/exec" style="color:#3498db;">here</a> if not redirected automatically.</p>
  </div>

  <script>
    let timeLeft = 5;
    const targetUrl = 'https://script.google.com/macros/s/AKfycbxMjpVgpSb_guwHO9FwFB46S41GCelZoOWhVZ1ndDkAUVxQkXYPuZAnLSGgfSHeOg70/exec';
    
    const countdown = document.getElementById('countdown');
    const timer = setInterval(() => {
      timeLeft--;
      countdown.textContent = timeLeft;
      
      if (timeLeft <= 0) {
        clearInterval(timer);
        window.location.href = targetUrl;
      }
    }, 1000);
    
    // Backup: 6 seconds बाद direct redirect
    setTimeout(() => {
      window.location.replace(targetUrl);
    }, 6000);
  </script>
</body>
</html>
