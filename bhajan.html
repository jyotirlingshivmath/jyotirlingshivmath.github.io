<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>शिव भजन</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js"></script>

<style>
body {
    font-family: 'Mukta', sans-serif;
    background: #fff8e1;
    color: #4a148c;
    margin: 0;
    padding: 0;
}

.container {
    max-width: 1200px;
    margin: 20px auto;
    padding: 10px;
}

h2 {
    text-align: center;
    margin-bottom: 30px;
    font-size: 2.5rem;
    color: #b71c1c;
}

.bhajan-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    justify-content: center;
    max-width: 1100px;
    margin: 0 auto;
}

.bhajan-card {
    background: #fff3e0;
    border: 2px solid #ffe0b2;
    border-radius: 12px;
    padding: 15px;
    box-shadow: 2px 2px 10px rgba(0,0,0,0.1);
    display: flex;
    flex-direction: column;
    height: 100%;
}

.bhajan-title {
    font-size: 1.3rem;
    margin-bottom: 10px;
    color: #4a148c;
    text-align: center;
}

.player-container {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
}

.universal-player {
    flex: 1;
    min-width: 150px;
    display: flex;
    align-items: center;
    gap: 8px;
    background: #ffffff;
    border: 1px solid #ddd;
    border-radius: 10px;
    padding: 10px;
}

.play-btn {
    padding: 8px 14px;
    background: #4a148c;
    color: #fff;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    min-width: 80px;
    transition: all 0.3s;
}

.play-btn:hover {
    background: #6a1b9a;
}

.play-btn.error {
    background: #d32f2f;
}

.time {
    font-size: 14px;
    color: #444;
    min-width: 60px;
}

.progress {
    flex: 1;
    height: 6px;
    background: #e0e0e0;
    border-radius: 999px;
    overflow: hidden;
    cursor: pointer;
}

.progress-bar {
    width: 0%;
    height: 100%;
    background: linear-gradient(45deg, #4a148c, #7b1fa2);
    transition: width 0.1s;
}

button.pdf-btn {
    padding: 8px 12px;
    background: #4a148c;
    color: #fff;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

button.pdf-btn:hover {
    background: #6a1b9a;
}

@media (max-width: 900px) {
    .bhajan-grid {
        grid-template-columns: repeat(2, 1fr);
        max-width: 100%;
    }
}

@media (max-width: 600px) {
    .bhajan-grid {
        grid-template-columns: 1fr;
    }
    .player-container {
        flex-direction: column;
        align-items: stretch;
    }
    button.pdf-btn {
        width: 100%;
    }
}
</style>
</head>

<body>
<div id="header-placeholder"></div>

<div class="container">
    <h2>🔱 शिव भजन (रचनाकार- भगवान शिव)🔱</h2>

    <div class="bhajan-grid">
        <!-- ✅ WORKING FILES - GitHub RAW URLs -->
        <div class="bhajan-card">
            <div class="bhajan-title">शिव तांडवक(क्रीड़ा - बंधु मातु के प्रकाशवान अम्बक से।
अनुजों के ताप के समूल नाशकारी हो॥)</div>
            <div class="player-container">
                <div class="universal-player">
                    <button class="play-btn" onclick="togglePlay(this, 'https://raw.githubusercontent.com/jyotirlingshivmath/jyotirlingshivmath.github.io/main/shiv_bhajan/bhajan_audio_shiv_bhajan_1.mp3')">Play</button>
                    <div class="progress" onclick="seekAudio(this, event)"><div class="progress-bar"></div></div>
                    <div class="time">00:00</div>
                </div>
                <button class="pdf-btn" onclick="window.open('bhajan1.pdf','_blank')">PDF</button>
            </div>
        </div>

        <div class="bhajan-card">
            <div class="bhajan-title">हे जग जननी हे जग पालनि हे जग सँहारिन हे अम्बे, 
करता हूँ मैं तेरा पूजन स्वीकार करो हे जगदम्बे 
</div>
            <div class="player-container">
                <div class="universal-player">
                    <button class="play-btn" onclick="togglePlay(this, 'https://raw.githubusercontent.com/jyotirlingshivmath/jyotirlingshivmath.github.io/main/shiv_bhajan/matakebhajan1.mp3')">Play</button>
                    <div class="progress" onclick="seekAudio(this, event)"><div class="progress-bar"></div></div>
                    <div class="time">00:00</div>
                </div>
                <button class="pdf-btn" onclick="window.open('bhajan3.pdf','_blank')">PDF</button>
            </div>
        </div>

        <div class="bhajan-card">
            <div class="bhajan-title">शिव भजन 9</div>
            <div class="player-container">
                <div class="universal-player">
                    <button class="play-btn" onclick="togglePlay(this, 'https://raw.githubusercontent.com/jyotirlingshivmath/jyotirlingshivmath.github.io/main/shiv_bhajan/bhavasagar.mp3')">Play</button>
                    <div class="progress" onclick="seekAudio(this, event)"><div class="progress-bar"></div></div>
                    <div class="time">00:00</div>
                </div>
                <button class="pdf-btn" onclick="window.open('bhajan9.pdf','_blank')">PDF</button>
            </div>
        </div>

        <div class="bhajan-card">
            <div class="bhajan-title">शिव भजन 22</div>
            <div class="player-container">
                <div class="universal-player">
                    <button class="play-btn" onclick="togglePlay(this, 'https://raw.githubusercontent.com/jyotirlingshivmath/jyotirlingshivmath.github.io/main/shiv_bhajan/bhavsagar.mp3')">Play</button>
                    <div class="progress" onclick="seekAudio(this, event)"><div class="progress-bar"></div></div>
                    <div class="time">00:00</div>
                </div>
                <button class="pdf-btn" onclick="window.open('bhajan22.pdf','_blank')">PDF</button>
            </div>
        </div>

        <!-- ❌ MISSING FILES - Error handling dikhega -->
        <div class="bhajan-card">
            <div class="bhajan-title">शिव भजन 11</div>
            <div class="player-container">
                <div class="universal-player">
                    <button class="play-btn" onclick="togglePlay(this, 'https://raw.githubusercontent.com/jyotirlingshivmath/jyotirlingshivmath.github.io/main/bhajan_audio/shiv_bhajan_11.mp3')">Play</button>
                    <div class="progress" onclick="seekAudio(this, event)"><div class="progress-bar"></div></div>
                    <div class="time">00:00</div>
                </div>
                <button class="pdf-btn" onclick="window.open('bhajan11.pdf','_blank')">PDF</button>
            </div>
        </div>

        <div class="bhajan-card">
            <div class="bhajan-title">शिव भजन 222</div>
            <div class="player-container">
                <div class="universal-player">
                    <button class="play-btn" onclick="togglePlay(this, 'https://raw.githubusercontent.com/jyotirlingshivmath/jyotirlingshivmath.github.io/main/bhajan_audio/shiv_bhajan_222.mp3')">Play</button>
                    <div class="progress" onclick="seekAudio(this, event)"><div class="progress-bar"></div></div>
                    <div class="time">00:00</div>
                </div>
                <button class="pdf-btn" onclick="window.open('bhajan222.pdf','_blank')">PDF</button>
            </div>
        </div>
    </div>
</div>

<script>
let currentSound = null;
let currentBtn = null;
let currentCard = null;

function togglePlay(btn, src) {
    const card = btn.closest('.bhajan-card');

    // Same track toggle
    if (currentSound && currentBtn === btn) {
        if (currentSound.playing()) {
            currentSound.pause();
            btn.textContent = 'Play';
            return;
        } else {
            currentSound.play();
            btn.textContent = 'Pause';
            return;
        }
    }

    // Stop previous
    if (currentSound) {
        currentSound.stop();
        currentSound.unload();
        if (currentBtn) currentBtn.textContent = 'Play';
    }

    btn.textContent = 'Loading...';
    
    currentSound = new Howl({
        src: [src],
        html5: true,
        onload: function() {
            currentSound.play();
        },
        onplay: function() {
            btn.textContent = 'Pause';
            currentBtn = btn;
            currentCard = card;
            updateProgress();
        },
        onpause: function() {
            btn.textContent = 'Play';
        },
        onstop: function() {
            btn.textContent = 'Play';
            resetProgress(card);
        },
        onend: function() {
            btn.textContent = 'Play';
            resetProgress(card);
        },
        onloaderror: function(id, err) {
            btn.textContent = '❌ File Missing';
            btn.classList.add('error');
            console.error('Audio load failed:', src);
        },
        onplayerror: function(id, err) {
            btn.textContent = '❌ Play Error';
            btn.classList.add('error');
            console.error('Audio play failed:', src);
        }
    });
}

function updateProgress() {
    if (!currentSound || !currentCard) return;

    const duration = currentSound.duration() || 0;
    const seek = currentSound.seek() || 0;
    const percent = duration ? (seek / duration) * 100 : 0;

    const bar = currentCard.querySelector('.progress-bar');
    const timeEl = currentCard.querySelector('.time');

    if (bar) bar.style.width = percent + '%';
    if (timeEl) timeEl.textContent = formatTime(seek);

    if (currentSound.playing()) {
        requestAnimationFrame(updateProgress);
    }
}

function seekAudio(progressEl, event) {
    if (!currentSound) return;
    const rect = progressEl.getBoundingClientRect();
    const x = event.clientX - rect.left;
    const percent = x / rect.width;
    const duration = currentSound.duration();
    currentSound.seek(duration * percent);
}

function resetProgress(card) {
    const bar = card.querySelector('.progress-bar');
    const timeEl = card.querySelector('.time');
    if (bar) bar.style.width = '0%';
    if (timeEl) timeEl.textContent = '00:00';
}

function formatTime(sec) {
    sec = Math.floor(sec || 0);
    const m = Math.floor(sec / 60);
    const s = sec % 60;
    return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
}

fetch('header.html')
.then(response => response.text())
.then(html => {
    const placeholder = document.getElementById('header-placeholder');
    placeholder.innerHTML = html;
    const scripts = placeholder.querySelectorAll("script");
    scripts.forEach(oldScript => {
        const newScript = document.createElement("script");
        if (oldScript.src) {
            newScript.src = oldScript.src;
        } else {
            newScript.textContent = oldScript.textContent;
        }
        document.body.appendChild(newScript);
        oldScript.remove();
    });
})
.catch(error => console.log('Header load error:', error));
</script>

</body>
</html>
