<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>शिव भजन</title>

<style>
body {
    font-family: 'Mukta', sans-serif;
    background: #fff8e1;
    color: #4a148c;
    margin: 0;
    padding: 0;
}

.container {
    max-width: 1200px;
    margin: 20px auto;
    padding: 10px;
}

h2 {
    text-align: center;
    margin-bottom: 30px;
    font-size: 2.5rem;
    color: #b71c1c;
}

/* =========================
   Bhajan Grid (CENTER FIX)
   ========================= */
.bhajan-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    justify-content: center;
    max-width: 1100px;
    margin: 0 auto;
}

.bhajan-card {
    background: #fff3e0;
    border: 2px solid #ffe0b2;
    border-radius: 12px;
    padding: 15px;
    box-shadow: 2px 2px 10px rgba(0,0,0,0.1);
    display: flex;
    flex-direction: column;
    height: 100%;
}

.bhajan-title {
    font-size: 1.3rem;
    margin-bottom: 10px;
    color: #4a148c;
    text-align: center;
}

.player-container {
    display: flex;
    align-items: center;
    gap: 10px;
}

/* 🎵 UNIVERSAL AUDIO PLAYER - KISI BHI MP3 KO CHALEGA 🎵 */
.universal-player {
    flex: 1;
    min-width: 150px;
    height: 50px;
}

.universal-player audio {
    width: 100%;
    height: 100%;
    outline: none;
}

.universal-player audio::-webkit-media-controls-panel {
    background: linear-gradient(45deg, #4a148c, #7b1fa2);
    border-radius: 8px;
    padding: 5px;
}

.universal-player audio::-webkit-media-controls-play-button,
.universal-player audio::-webkit-media-controls-mute-button {
    background: #fff;
    border-radius: 50%;
    width: 30px;
    height: 30px;
}

.universal-player audio::-webkit-media-controls-play-button:hover {
    background: #ffeb3b !important;
    transform: scale(1.1);
}

.universal-player audio::-webkit-media-controls-timeline {
    background: rgba(255,255,255,0.8);
    border-radius: 5px;
    height: 6px;
}

.universal-player audio::-webkit-media-controls-volume-slider {
    background: rgba(255,255,255,0.8);
}

button.pdf-btn {
    padding: 8px 12px;
    background: #4a148c;
    color: #fff;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

button.pdf-btn:hover {
    background: #6a1b9a;
}

/* =========================
   Responsive
   ========================= */
@media (max-width: 900px) {
    .bhajan-grid {
        grid-template-columns: repeat(2, 1fr);
        max-width: 100%;
    }
}

@media (max-width: 600px) {
    .bhajan-grid {
        grid-template-columns: 1fr;
    }

    .player-container {
        flex-direction: column;
        align-items: stretch;
    }

    button.pdf-btn {
        width: 100%;
    }
}
</style>
</head>

<body>

<!-- Header Include -->
<div id="header-placeholder"></div>

<div class="container">
    <h2>🔱 शिव भजन 🔱</h2>

    <div class="bhajan-grid">

        <div class="bhajan-card">
            <div class="bhajan-title">शिव तांडवक (रचनाकार- महंत राजेश तिवारी)</div>
            <div class="player-container">
                <div class="universal-player">
                    <audio controls preload="metadata">
                        <source src="../bhajan_audio/shiv_bhajan_1.mp3" type="audio/mpeg">
                        <source src="../bhajan_audio/shiv_bhajan_1.mp3" type="audio/mp3">
                        Your browser does not support the audio element.
                    </audio>
                </div>
                <button class="pdf-btn" onclick="window.open('bhajan1.pdf','_blank')">Download PDF</button>
            </div>
        </div>

        <div class="bhajan-card">
            <div class="bhajan-title">MATA DURGA KE BHAJAN</div>
            <div class="player-container">
                <div class="universal-player">
                    <audio controls preload="metadata">

                <button class="pdf-btn" onclick="window.open('bhajan3.pdf','_blank')">Download PDF</button>
            </div>
        </div>

        <div class="bhajan-card">
            <div class="bhajan-title">shiv_bhajan_4.mp3</div>
            <div class="player-container">
                <div class="universal-player">
                    <audio controls preload="metadata">

                    </audio>
                </div>
                <button class="pdf-btn" onclick="window.open('bhajan4.pdf','_blank')">Download PDF</button>

        </div>

    </div>
</div>

<script>
fetch('header.html')
.then(response => response.text())
.then(html => {
    const placeholder = document.getElementById('header-placeholder');
    placeholder.innerHTML = html;

    const scripts = placeholder.querySelectorAll("script");
    scripts.forEach(oldScript => {
        const newScript = document.createElement("script");
        if (oldScript.src) {
            newScript.src = oldScript.src;
        } else {
            newScript.textContent = oldScript.textContent;
        }
        document.body.appendChild(newScript);
        oldScript.remove();
    });
})
.catch(error => console.log('Header load error:', error));
</script>

</body>
</html>
