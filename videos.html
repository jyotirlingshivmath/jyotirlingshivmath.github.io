  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #fff8f0;
    }

    /* Header placeholder */
    #header-placeholder {
      width: 100%;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    /* Loading message */
    .loading-msg {
      text-align: center;
      padding: 30px 20px;
      font-size: 1.2rem;
      color: #5a0000;
    }

    /* Video gallery grid */
    .video-gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    /* Each video frame */
    .video-frame {
      position: relative;
      width: 100%;
      padding-top: 56.25%; /* 16:9 Aspect Ratio */
    }

    .video-frame iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      /* এখানে YouTube 썸네일 로딩 + SEO에 안전 ↓ */
    }
  </style>

<body>

  <!-- 🔱 Header Include -->
  <div id="header-placeholder"></div>

  <script>
    fetch('header.html')
    .then(res => res.text())
    .then(data => {
        const placeholder = document.getElementById('header-placeholder');
        placeholder.innerHTML = data;

        // ✅ Fix: header ke scripts execute karna
        const scripts = placeholder.querySelectorAll("script");
        scripts.forEach(oldScript => {
            const newScript = document.createElement("script");
            if(oldScript.src){
                newScript.src = oldScript.src;
            } else {
                newScript.textContent = oldScript.textContent;
            }
            document.body.appendChild(newScript);
            oldScript.remove();
        });
    })
    .catch(err => console.log('Header load error:', err));
  </script>

  <!-- 🔽 Loading Message -->
  <div class="loading-msg" id="loadingMsg">
    🔱 कृपया प्रतीक्षा करें… वीडियो लोड हो रहे हैं
