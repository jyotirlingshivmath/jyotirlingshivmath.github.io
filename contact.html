<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1024">
  <title>संपर्क करें - श्री ज्योतिर्लिंग शिवमठ</title>
  <style>
    body {
      font-family: 'Mangal', sans-serif;
      margin: 0;
      padding: 0;
      background-color: #fffbea;
    }

    #header-container {
      width: 100%;
    }

    .contact-section {
      max-width: 800px;
      margin: 20px auto;
      background: #fff3e0;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      color: #8B0000;
    }

    .address {
      background-color: #ffe4c4;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 18px;
      line-height: 1.6;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    label {
      font-weight: bold;
    }

    input, textarea, select {
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-family: 'Mangal', sans-serif;
      font-size: 16px;
    }

    button {
      background-color: #8B0000;
      color: white;
      border: none;
      padding: 12px;
      font-size: 16px;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background-color: #a52a2a;
    }

    img {
      max-width: 100%;
      height: auto;
    }

    #result {
      margin-top: 10px;
      font-size: 16px;
      font-weight: bold;
      text-align: center;
    }

    @media (max-width: 768px) {
      body {
        font-size: 14px;
        transform: scale(0.85);
        transform-origin: top left;
        width: 118%;
      }
    }
  </style>
</head>
<body>

  <div id="header-container"></div>

  <div class="contact-section">
    <h2>📍 हमारा पता</h2>
    <div class="address">
      महंत ज्योतिर्लिंग शिवमठ<br>
      शिवमठ मार्ग, रेलवे स्टेशन के पास, उतराठिया, बराोली, लखनऊ - 226014<br>
      Mobile Number: 9794810005
    </div>

    <h2>📩 संपर्क करें / पूजा बुकिंग</h2>
    <h2>📩 ज्योतिर्लिंग शिवमठ पर किसी भी पूजन के लिए कोई शुल्क निर्धारित नहीं है। सभी श्रद्धालु भक्तों से अनुरोध है कि वे पूजन की पवित्रता बनाए रखें।</h2>

    <form id="contactForm">
      <input type="hidden" name="access_key" value="YOUR_ACCESS_KEY_HERE">
      <input type="hidden" name="subject" value="नई पूजा बुकिंग - ज्योतिर्लिंग शिवमठ">
      <input type="hidden" name="from_name" value="ज्योतिर्लिंग शिवमठ वेबसाइट">
      <input type="checkbox" name="botcheck" style="display: none;">

      <label for="name">नाम:</label>
      <input type="text" id="name" name="name" placeholder="अपना नाम लिखें" required>

      <label for="phone">मोबाइल नंबर:</label>
      <input type="tel" id="phone" name="phone" placeholder="आपका मोबाइल नंबर" required>

      <label for="email">ईमेल:</label>
      <input type="email" id="email" name="email" placeholder="आपका ईमेल" required>

      <label for="pooja">आप कौन सी पूजा कराना चाहते हैं?</label>
      <select id="pooja" name="pooja" required>
        <option value="">-- पूजा का चयन करें --</option>
        <option value="शिव अभिषेक">शिव अभिषेक</option>
        <option value="रुद्राभिषेक">रुद्राभिषेक</option>
        <option value="महामृत्युंजय जाप">महामृत्युंजय जाप</option>
        <option value="लघु रुद्र">लघु रुद्र</option>
        <option value="विशेष हवन">विशेष हवन</option>
        <option value="अन्य">अन्य</option>
      </select>

      <label for="date">पूजा की तिथि:</label>
      <input type="date" id="date" name="date" required>

      <label for="message">अतिरिक्त विवरण:</label>
      <textarea id="message" name="message" rows="5" placeholder="गुरु जी से मिलने के लिए अपना प्रयोजन लिखें"></textarea>

      <button type="submit">भेजें</button>
      <div id="result"></div>
    </form>
  </div>

  <script>
    fetch('header.html')
      .then(response => response.text())
      .then(data => {
        const container = document.getElementById('header-container');
        container.innerHTML = data;

        const scripts = container.querySelectorAll('script');
        scripts.forEach(oldScript => {
          const newScript = document.createElement('script');
          if (oldScript.src) {
            newScript.src = oldScript.src;
          } else {
            newScript.textContent = oldScript.textContent;
          }
          document.body.appendChild(newScript);
        });
      })
      .catch(err => console.error('Header load error:', err));

    const form = document.getElementById("contactForm");
    const result = document.getElementById("result");

    form.addEventListener("submit", function (e) {
      e.preventDefault();

      result.innerHTML = "कृपया प्रतीक्षा करें...";
      result.style.color = "#8B0000";

      const formData = new FormData(form);
      const object = Object.fromEntries(formData);
      const json = JSON.stringify(object);

      fetch("https://api.web3forms.com/submit", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Accept": "application/json"
        },
        body: json
      })
      .then(async (response) => {
        let data = await response.json();
        if (response.status == 200) {
          result.innerHTML = "✅ आपका संदेश सफलतापूर्वक भेज दिया गया है।";
          result.style.color = "green";
          form.reset();
        } else {
          result.innerHTML = "❌ " + data.message;
          result.style.color = "red";
        }
      })
      .catch(() => {
        result.innerHTML = "❌ कुछ त्रुटि हो गई। कृपया पुनः प्रयास करें।";
        result.style.color = "red";
      });
    });
  </script>

</body>
</html>
